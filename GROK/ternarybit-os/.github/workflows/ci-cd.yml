name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [created]

env:
  BUILD_TYPE: Release

jobs:
  # V4.0 Universal Boot Pipeline
  build-v4:
    name: Build V4.0 (BIOS + Hosted Linux)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc make qemu-system-x86

    - name: Build V4.0 targets
      run: ./build_v4.sh

    - name: Verify artifacts
      run: |
        test -f artifacts/baremetal/tbos-bios.img && echo "BIOS image: OK"
        test -f artifacts/hosted/tbos-linux && echo "Hosted Linux: OK"

    - name: Upload V4.0 artifacts
      uses: actions/upload-artifact@v3
      with:
        name: v4-artifacts
        path: |
          artifacts/baremetal/tbos-bios.img
          artifacts/hosted/tbos-linux

  test-bcb:
    name: BCB Unit Tests
    needs: build-v4
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Run BCB tests
      run: make test-bcb-host

  test-hosted-linux:
    name: Hosted Linux Tests
    needs: build-v4
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: v4-artifacts
        path: artifacts
    - name: Make executable
      run: chmod +x artifacts/hosted/tbos-linux
    - name: Run hosted Linux smoke test
      run: |
        echo -e "bcb\nmemory\nexit" | ./artifacts/hosted/tbos-linux

  test-integration-v4:
    name: V4.0 Integration Tests
    needs: build-v4
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: v4-artifacts
        path: artifacts
    - name: Install QEMU
      run: sudo apt-get install -y qemu-system-x86
    - name: Make tests executable
      run: chmod +x tests/integration/*.sh artifacts/hosted/tbos-linux 2>/dev/null || true
    - name: Run integration tests
      run: ./scripts/run-tests.sh --type integration -v

  # Legacy build matrix (kept for compatibility)
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
          - os: macos-latest
            cc: clang
            cxx: clang++

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up QEMU
      if: matrix.os == 'ubuntu-latest'
      uses: docker/setup-qemu-action@v2

    - name: Set up build environment
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          sudo apt-get update
          sudo apt-get install -y gcc g++ make nasm qemu-system-x86
        else
          brew install make qemu nasm
        fi

    - name: Build
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: |
        ./build_v4.sh || make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        if [ -f "artifacts/baremetal/tbos-bios.img" ] || [ -f "build/tbos_kernel" ]; then
          echo "Build successful"
        else
          echo "Build completed (artifacts may vary by platform)"
        fi

    - name: Run tests
      if: matrix.os == 'ubuntu-latest'
      run: |
        make test-bcb-host || true
        make test || true

  create-release:
    name: Create Release
    needs: build-and-test
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    
    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential qemu-system-x86
    
    - name: Build release
      run: |
        make clean
        make -j$(nproc) RELEASE=1
    
    - name: Create release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: TernaryBit OS ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        body: |
          # TernaryBit OS ${{ github.ref_name }}
          
          ## Changes
          
          - Built on: ${{ github.sha }}
          - Date: ${{ github.event.repository.pushed_at }}
          
          ## Assets
          
          - `tbos_kernel` - Main kernel binary
          - `tbos_installer.exe` - Windows installer
          - `tbos_checksums.sha256` - File integrity checksums
        draft: false
        prerelease: false
        files: |
          build/tbos_kernel
          build/windows/TernaryBitOS-Installer.exe
          build/checksums.sha256

  deploy-docs:
    name: Deploy Documentation
    needs: [build-and-test, create-release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup mdBook
      uses: peaceiris/actions-mdbook@v1
      with:
        mdbook-version: '0.4.21'
    
    - name: Build and Deploy
      run: |
        cd docs
        mdbook build
        # Add deployment steps here (e.g., to GitHub Pages)
